apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: poc-cng-editable-tile
  namespace: knative-pool
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "1"
        autoscaling.knative.dev/scale-down-delay: "60s"
        autoscaling.knative.dev/target: "5"
    spec:
      containerConcurrency: 5
      timeoutSeconds: 60
      containers:
        - image: poc-cng-editable-tile:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: HOME
              value: /tmp
            - name: BASE_MBTILES_PATH
              value: /app/data/base.mbtiles
            - name: EDITS_SQLITE_PATH
              value: /edits/edits.sqlite
            - name: BUILDINGS_LAYER_NAME
              value: building
          volumeMounts:
            - name: edits
              mountPath: /edits
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: edits
          persistentVolumeClaim:
            claimName: poc-cng-editable-tile-edits
