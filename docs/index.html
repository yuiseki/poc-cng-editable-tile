<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>poc-cng-editable-tile</title>
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    html, body, #map { margin: 0; padding: 0; height: 100%; }
    #panel {
      position: absolute; top: 8px; left: 8px; z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      padding: 8px 10px; border-radius: 6px;
      font: 12px/1.4 -apple-system, system-ui, sans-serif;
      max-width: 320px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
    }
    #panel h1 { margin: 0 0 6px 0; font-size: 12px; }
    .row { margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    .row label { white-space: nowrap; }
    .row input, .row select { flex: 1; min-width: 0; box-sizing: border-box; font-size: 12px; }
    #status { margin-top: 4px; color: #555; }
    #feature-info {
      margin-top: 6px; padding: 5px 7px; background: #f5f5f5;
      border-radius: 4px; font-size: 11px; font-family: monospace;
      display: none; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow-y: auto;
    }
    #edit-section { margin-top: 8px; border-top: 1px solid #ddd; padding-top: 6px; }
    #edit-section h2 { margin: 0 0 4px; font-size: 11px; color: #888; text-transform: uppercase; }
    textarea { width: 100%; box-sizing: border-box; font-size: 11px; font-family: monospace; resize: vertical; }
    button { margin-top: 4px; width: 100%; font-size: 12px; cursor: pointer; padding: 4px; }
    #status.ok  { color: green; }
    #status.err { color: red; }
    #history-section { margin-top: 8px; border-top: 1px solid #ddd; padding-top: 6px; display: none; }
    #history-section h2 { margin: 0 0 4px; font-size: 11px; color: #888; text-transform: uppercase; }
    #history-list { max-height: 160px; overflow-y: auto; margin-top: 4px; }
    .hist-row {
      display: flex; align-items: flex-start; gap: 4px;
      padding: 3px 0; border-bottom: 1px solid #eee; font-size: 11px;
    }
    .hist-row:last-child { border-bottom: none; }
    .hist-meta { flex: 1; min-width: 0; }
    .hist-id { color: #aaa; }
    .hist-action { font-weight: 600; }
    .hist-action.upsert_tags { color: #0066cc; }
    .hist-action.delete { color: #cc2200; }
    .hist-action.restore { color: #44bb44; }
    .hist-tags { color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-time { color: #aaa; font-size: 10px; }
    .btn-revert {
      flex-shrink: 0; width: auto; margin-top: 0;
      font-size: 10px; padding: 2px 5px; cursor: pointer;
      background: #fff; border: 1px solid #bbb; border-radius: 3px; white-space: nowrap;
    }
    .btn-revert:hover { background: #fee; border-color: #c00; color: #c00; }
    #legend {
      position: absolute; bottom: 30px; left: 8px; z-index: 1;
      background: rgba(255,255,255,0.92); padding: 6px 10px; border-radius: 6px;
      font: 11px/1.6 -apple-system, system-ui, sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #legend .title { font-weight: bold; margin-bottom: 2px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div id="panel">
  <h1>poc-cng-editable-tile</h1>
  <div id="status">Loading…</div>
  <div id="feature-info"></div>
  <div id="edit-section">
    <h2>Edit Feature</h2>
    <div class="row">
      <label>osm_id</label>
      <input id="osm-id" type="number" placeholder="例: 123456789" />
    </div>
    <div class="row">
      <label>action</label>
      <select id="action">
        <option value="upsert_tags">upsert_tags</option>
        <option value="delete">delete</option>
        <option value="restore">restore</option>
      </select>
    </div>
    <div id="tags-row" class="row" style="flex-direction:column;align-items:stretch;">
      <label>tags (JSON)</label>
      <textarea id="tags" rows="3">{"disaster:damage":"major","disaster:confidence":"0.8"}</textarea>
    </div>
    <button id="btn-submit">Apply Edit</button>
    <button id="btn-reload">Reload Tiles</button>
  </div>
  <div id="history-section">
    <h2>Edit History</h2>
    <div id="history-list"></div>
  </div>
</div>
<div id="legend">
  <div class="title">disaster:damage</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#cc2200"></div>major</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ff8800"></div>moderate</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ffcc00"></div>minor</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#44bb44"></div>none</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#4488ff"></div>未編集</div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const TILE_API = 'https://poc-cng-editable-tile.yuiseki.com';
const IMAGERY  = 'https://hotosm-imagery-tile.yuiseki.com';

// STAC item 60e5afbe5bc2dc00058bbe06 — Atami / Izusan 2021 debris-flow
const BBOX = [139.068869, 35.112867, 139.081648, 35.123595];

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tile.yuiseki.net/styles/osm-fiord/style.json',
  center: [(BBOX[0] + BBOX[2]) / 2, (BBOX[1] + BBOX[3]) / 2],
  zoom: 14,
  hash: true,
});
map.addControl(new maplibregl.NavigationControl(), 'top-right');

const statusEl = document.getElementById('status');
function setStatus(msg, cls = '') {
  statusEl.textContent = msg;
  statusEl.className = cls;
}

map.on('style.load', () => {
  // 1. HOTOSM Imagery raster overlay
  map.addSource('imagery', {
    type: 'raster',
    tiles: [`${IMAGERY}/tiles/{z}/{x}/{y}.png`],
    tileSize: 512,
    attribution: 'Imagery © HOTOSM / OpenAerialMap contributors',
  });
  map.addLayer({ id: 'imagery-layer', type: 'raster', source: 'imagery' });

  // 2. Editable vector tiles
  map.addSource('editable', {
    type: 'vector',
    tiles: [`${TILE_API}/tiles/{z}/{x}/{y}`],
    minzoom: 0,
    maxzoom: 14,
  });

  // Color by disaster:damage tag (data-driven)
  const damageColor = [
    'match', ['get', 'disaster:damage'],
    'major',    '#cc2200',
    'moderate', '#ff8800',
    'minor',    '#ffcc00',
    'none',     '#44bb44',
    /* default */ '#4488ff',
  ];

  map.addLayer({
    id: 'building-fill',
    type: 'fill',
    source: 'editable',
    'source-layer': 'building',
    paint: { 'fill-color': damageColor, 'fill-opacity': 0.45 },
  });
  map.addLayer({
    id: 'building-outline',
    type: 'line',
    source: 'editable',
    'source-layer': 'building',
    paint: { 'line-color': damageColor, 'line-width': 1.2, 'line-opacity': 0.9 },
  });
  // Highlight selected building
  map.addLayer({
    id: 'building-selected',
    type: 'fill',
    source: 'editable',
    'source-layer': 'building',
    filter: ['==', ['get', 'osm_id'], -1],
    paint: { 'fill-color': '#ffffff', 'fill-opacity': 0.35 },
  });

  // Road layer — colored by disaster:damage
  map.addLayer({
    id: 'road',
    type: 'line',
    source: 'editable',
    'source-layer': 'road',
    paint: {
      'line-color': damageColor,
      'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1.5, 14, 4],
      'line-opacity': 0.9,
    },
  });
  // Highlight selected road
  map.addLayer({
    id: 'road-selected',
    type: 'line',
    source: 'editable',
    'source-layer': 'road',
    filter: ['==', ['get', 'osm_id'], -1],
    paint: { 'line-color': '#ffffff', 'line-width': 6, 'line-opacity': 0.6 },
  });

  // Fit to STAC item bbox
  map.fitBounds([[BBOX[0], BBOX[1]], [BBOX[2], BBOX[3]]], { padding: 40, duration: 0 });
  setStatus('Ready');
});

const featureInfoEl = document.getElementById('feature-info');

function showFeatureInfo(props) {
  const skip = new Set(['osm_id', 'osm_type']);
  const lines = Object.entries(props)
    .filter(([k]) => !skip.has(k) && props[k] != null && props[k] !== '')
    .map(([k, v]) => `${k}: ${v}`);
  if (lines.length === 0) {
    featureInfoEl.textContent = '(タグなし)';
  } else {
    featureInfoEl.textContent = lines.join('\n');
  }
  featureInfoEl.style.display = 'block';
}

function selectFeature(props, layerType) {
  if (props.osm_id == null) { setStatus('この feature に osm_id がありません'); return; }
  document.getElementById('osm-id').value = props.osm_id;
  // clear all highlights
  map.setFilter('building-selected', ['==', ['get', 'osm_id'], -1]);
  map.setFilter('road-selected',     ['==', ['get', 'osm_id'], -1]);
  if (layerType === 'building') {
    map.setFilter('building-selected', ['==', ['get', 'osm_id'], props.osm_id]);
  } else {
    map.setFilter('road-selected', ['==', ['get', 'osm_id'], props.osm_id]);
  }
  setStatus(`Selected ${layerType} osm_id: ${props.osm_id}`);
  showFeatureInfo(props);
  loadHistory('way', props.osm_id);
}

async function loadHistory(osmType, osmId) {
  const section = document.getElementById('history-section');
  const list = document.getElementById('history-list');
  list.innerHTML = '<span style="color:#aaa">読み込み中…</span>';
  section.style.display = 'block';

  try {
    const res = await fetch(`${TILE_API}/edits/events/${osmType}/${osmId}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const events = await res.json();

    if (events.length === 0) {
      list.innerHTML = '<span style="color:#aaa">編集履歴なし</span>';
      return;
    }

    list.innerHTML = '';
    for (const ev of events) {
      const tagsStr = Object.entries(ev.tags).map(([k, v]) => `${k}=${v}`).join(', ') || '—';
      const timeStr = ev.created_at.replace('T', ' ').slice(0, 19);

      const row = document.createElement('div');
      row.className = 'hist-row';
      row.innerHTML = `
        <div class="hist-meta">
          <span class="hist-id">#${ev.id}</span>
          <span class="hist-action ${ev.action}"> ${ev.action}</span>
          <div class="hist-tags" title="${tagsStr}">${tagsStr}</div>
          <div class="hist-time">${timeStr}</div>
        </div>
        <button class="btn-revert" data-event-id="${ev.id}" data-osm-type="${ev.osm_type}" data-osm-id="${ev.osm_id}">↩ 戻す</button>
      `;
      list.appendChild(row);
    }
  } catch (e) {
    list.innerHTML = `<span style="color:red">取得失敗: ${e.message}</span>`;
  }
}

document.getElementById('history-list').addEventListener('click', async (e) => {
  const btn = e.target.closest('.btn-revert');
  if (!btn) return;
  const eventId = parseInt(btn.dataset.eventId, 10);
  const osmType = btn.dataset.osmType;
  const osmId = parseInt(btn.dataset.osmId, 10);

  if (!confirm(`event #${eventId} の直前の状態に戻しますか？`)) return;

  setStatus('Reverting…');
  try {
    const res = await fetch(`${TILE_API}/edits/revert-event`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event_id: eventId }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    setStatus(`OK: reverted to before event #${eventId}`, 'ok');
    reloadTiles();
    await loadHistory(osmType, osmId);
    // Refresh feature info
    try {
      const r = await fetch(`${TILE_API}/edits/${osmType}/${osmId}`);
      if (r.ok) { const d = await r.json(); showFeatureInfo({ ...d.tags }); }
      else featureInfoEl.textContent = '(タグなし)';
    } catch { /* ignore */ }
  } catch (err) {
    setStatus(`Error: ${err.message}`, 'err');
  }
});

map.on('click', 'building-fill', (e) => selectFeature(e.features[0].properties, 'building'));
map.on('click', 'road',          (e) => selectFeature(e.features[0].properties, 'road'));
map.on('mouseenter', 'building-fill', () => { map.getCanvas().style.cursor = 'pointer'; });
map.on('mouseleave', 'building-fill', () => { map.getCanvas().style.cursor = ''; });
map.on('mouseenter', 'road', () => { map.getCanvas().style.cursor = 'pointer'; });
map.on('mouseleave', 'road', () => { map.getCanvas().style.cursor = ''; });

// action select → show/hide tags field
const actionSel = document.getElementById('action');
const tagsRow   = document.getElementById('tags-row');
actionSel.addEventListener('change', () => {
  tagsRow.style.display = actionSel.value === 'upsert_tags' ? '' : 'none';
});

// Apply edit
document.getElementById('btn-submit').addEventListener('click', async () => {
  const osmId = parseInt(document.getElementById('osm-id').value, 10);
  const action = actionSel.value;
  if (!osmId) { setStatus('osm_id を入力してください', 'err'); return; }

  let tags = {};
  if (action === 'upsert_tags') {
    try { tags = JSON.parse(document.getElementById('tags').value); }
    catch { setStatus('tags JSON が不正です', 'err'); return; }
  }

  setStatus('Saving…');
  try {
    const res = await fetch(`${TILE_API}/edit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ osm_type: 'way', osm_id: osmId, action, tags }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    setStatus(`OK: ${action} applied`, 'ok');
    reloadTiles();
    // refresh feature info and history after tile reload settles
    setTimeout(async () => {
      const osmId = parseInt(document.getElementById('osm-id').value, 10);
      if (!osmId) return;
      try {
        const r = await fetch(`${TILE_API}/edits/way/${osmId}`);
        if (r.ok) { const d = await r.json(); showFeatureInfo({ ...d.tags }); }
      } catch { /* ignore */ }
      await loadHistory('way', osmId);
    }, 500);
  } catch (err) {
    setStatus(`Error: ${err.message}`, 'err');
  }
});

// Reload tiles (cache bust)
function reloadTiles() {
  const src = map.getSource('editable');
  if (src) src.setTiles([`${TILE_API}/tiles/{z}/{x}/{y}?t=${Date.now()}`]);
}
document.getElementById('btn-reload').addEventListener('click', reloadTiles);
</script>
</body>
</html>
